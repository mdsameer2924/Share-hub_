<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareHub</title>

</head>
<style>

    body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: 'Segoe UI';
}

/* Header */
header {
    text-align: center;
    padding: 20px;
}

header h1 {
    font-size: 28px;
}

.qr {
    margin: 10px auto;
    width: 70px;
    height: 70px;
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
}

/* Container */
.container {
    width: 80%;
    margin: auto;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin: 20px 0;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    position: relative;
}

/* Buttons */
button {
    background: #3b82f6;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #2563eb;
}

/* File Item */
.file-item {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

/* Notes */
.notes-section {
    position: relative;
}

.pen-icon {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    font-size: 20px;
}

.notes-preview {
    margin-top: 20px;
    color: #94a3b8;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #020617;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}

textarea {
    width: 100%;
    height: 100px;
    margin-top: 10px;
    background: #1e293b;
    border: none;
    color: white;
    padding: 10px;
}

.popup-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}
</style>

<body>

<!-- Header -->
<header>
    <h1>ShareHub</h1>
    <p>192.168.1.71:5000</p>
    <div class="qr">QR</div>
</header>

<!-- Main Container -->
<div class="container">

    <!-- Upload Section -->
    <div class="card">
        <h2>Upload File</h2>
        <input type="file">
        <button>Upload</button>
    </div>

    <!-- Notes Section -->
    <div class="card notes-section">
        <h2>Upload Text</h2>

        <!-- Pen Icon -->
        <span class="pen-icon" onclick="openPopup()">✏️</span>

        <div class="notes-preview">
            Click ✏️ to write notes
        </div>
    </div>

    <!-- Files Section -->
    <div class="card">
        <h2>Available Files</h2>

        <div class="file-item">
            <span>📄 readme.md</span>
            <di</div>
            <div>
                <button class="download">Download</button>
                <button class="delete">🗑</button>
            </div>
        </div>

    </div>

</div>

<!-- Popup Modal -->
<div id="popup" class="popup">
    <div class="popup-content">
        <h3>Write Notes</h3>
        <textarea id="noteText" placeholder="Write your notes here..."></textarea>
        <div class="popup-buttons">
            <button onclick="saveNote()">Save</button>
            <button onclick="closePopup()">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
