<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareHub</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui;
            background: #0f172a;
            color: white;
        }
        
        header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #334155;
        }
        
        header h1 {
            margin: 0;
            font-size: 24px;
        }
        
        .ip {
            font-size: 12px;
            color: #94a3b8;
        }
        
        main {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        
        .step {
            font-size: 14px;
            margin-bottom: 8px;
            color: #cbd5f5;
        }
        
        form {
            border: 2px dashed #38bdf8;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
        }
        
        input[type="file"] {
            margin: 10px 0;
        }
        
        button {
            background: #38bdf8;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .file {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        
        .file:hover {
            transform: scale(1.02);
        }
        
        .file p {
            margin: 0;
        }
        
        a {
            background: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 6px;
            color: black;
            font-size: 14px;
        }
        
        .devices {
            margin-top: 25px;
            padding-top: 10px;
            border-top: 1px solid #334155;
        }
        
        .device {
            font-size: 14px;
            margin-top: 5px;
            color: #cbd5f5;
        }
    </style>
</head>
<body>

    <header>
        <h1>ShareHub</h1>
        <p class="ip">192.168.1.10</p>
    </header>

    <main>

        <section>
            <p class="step">Upload File</p>

            <form action="/upload" method="POST" enctype="multipart/form-data">
                <p>Select a file to share</p>
                <input type="file" name="file" required>
                <br>
                <button type="submit">Upload</button>
            </form>
        </section>

        <section>
            <p class="step">Available Files</p>
{% for file in files %}
<article class="file">
    <p>📄 {{ file }}</p>
    <a href="/download/{{ file }}" name=file>Download</a>
</article>
{% else %}
<p style="color: #94a3b8;">Koi file nahi hai abhi.</p>
{% endfor %}
        </section>

        <section class="devices">
            <p class="step">Connected Devices</p>


        </section>

    </main>

</body>
</html>
